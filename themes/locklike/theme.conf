showFontSettingsGroup=true
showMainCardSettingsGroup=true
showWelcomeSettingsGroup=true
showPowerSettingsGroup=true
showSystemSettingsGroup=true
showAvatarSettingsGroup=true
showLanguageSettingsGroup=true

# Individual toggles (only effective if group is ON)
