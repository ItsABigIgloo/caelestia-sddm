#! ======================= CONFIG FOR MINIMALISTV2 ===========================
[General]
# ============================================================================
# TYPOGRAPHY
# ============================================================================
# Font Size
FontSize=11

# ============================================================================
# WELCOME MESSAGE
# ============================================================================
# Enable welcome message [true | false]
enableWelcomeMessage=true

# Custom welcome text (use $USER for username, use empty "" for no text )
welcomeMessage="Welcome $USER"

# ============================================================================
# CARD
# ============================================================================
# UI Elements Radius (inputs, combo boxes, toast)
elementRadius=25

# Login Card Radius
cardRadius=75

# Card border [true | false]
cardBorder=false

# Card frosted glass blur [true | false]
cardBlurEnabled=true

# Card blur strength [0.0 to 1.0]
cardBlurStrength=0.80

# Outer card opacity [0.50 to 1] (minimum 0.50 for visibility)
outerCardOpacity=0.80

# Inner card opacity [0.15 to 1] (minimum 0.15 for visibility)
innerCardOpacity=0.40

# Element opacity — inputs, dropdowns [0.1 to 1] (minimum 0.1 for visibility)
elementOpacity=0.50

# Card drop shadows [true | false]
dropShadows=true

# ============================================================================
# BACKGROUND
# ============================================================================
# Background blur [true | false]
blurEnabled=true

# Background blur strength [0.0 to 1.0]
blurStrength=0.50

# Background overlay opacity [0 to 1]
overlayOpacity=0.4

# ============================================================================
# DEBUG
# ============================================================================
# Debug mode (enable debug keyboard shortcuts) [true | false]
debugMode=false

# ============================================================================
# COLOR SCHEME
# ============================================================================
#! Do not touch these! (auto-synced by Caelestia)
mPrimary=#a0cddf
mOnPrimary=#144654

mSecondary=#b3cad4
mOnSecondary=#2e434b

mTertiary=#cdddff
mOnTertiary=#3a4f72

mError=#fa746f
mOnError=#490006

mSurface=#0b0f11
mOnSurface=#dee7eb

mSurfaceVariant=#1e272b
mOnSurfaceVariant=#a3adb1

mSurfaceContainer=#141b1d

mOutline=#6e777b
mShadow=#000000

